    <title>热门影视 - 洞悉影视</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            z-index: 1000;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo img {
            width: 40px;
            height: 40px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-link {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
        }
        
        .nav-link:not(:last-child)::after {
            content: "|";
            margin-left: 20px;
            color: #fff;
        }
        
        .register-btn {
            background-color: #00ffaa;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* 主体内容区 */
        .main-content {
            margin-top: 80px;
            padding: 40px 50px;
        }
        
        /* 页面标题 */
        .page-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #00ffaa;
        }
        
        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid #00ffaa;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active {
            background-color: #00ffaa;
            color: #000;
            font-weight: bold;
        }
        
        /* 电影网格 */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .movie-card {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 170, 0.2);
        }
        
        .movie-poster {
            width: 100%;
            height: 350px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .movie-rating {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #00ffaa;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .movie-info {
            padding: 15px;
        }
        
        .movie-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }
        
        .movie-year {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .movie-genres {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .genre-tag {
            background-color: rgba(0, 255, 170, 0.2);
            color: #00ffaa;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }
        
        .page-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid #00ffaa;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn.active {
            background-color: #00ffaa;
            color: #000;
            font-weight: bold;
        }
        
        .page-btn:hover:not(.active) {
            background-color: rgba(0, 255, 170, 0.2);
        }
    </style>
</head>
